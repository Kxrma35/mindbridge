<!DOCTYPE html>
<html>
  <head>
    <script>
      // Capture the current URL
      var segmentCount = 0;
      var l = window.location;
      s = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        s + '/?redirect=' + l.pathname.slice(s.length).slice(1).replace(/&/g, '~and~') +
        (l.search ? '&args=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
